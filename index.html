<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>Harvester Parts — Agricultural Machinery & Spare Parts Marketplace</title>
  <meta name="description" content="Harvester Parts is a verified agri marketplace for tractors, harvesters, implements, smart farming machinery and spare parts." />
  <meta name="theme-color" content="#f7f2e8" />
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="styles.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script defer src="config.js"></script>
  <script defer src="app.js"></script>
</head>
<body>
  <div id="intro" class="intro">
    <div class="intro-card">
      <span class="intro-line"></span><span class="intro-logo">HP</span>
      <b>Harvester Parts</b><small>Verified agri commerce</small>
    </div>
  </div>

  <header class="topbar">
    <a href="#home" class="brand" aria-label="Harvester Parts home"><span class="brand-mark">HP</span><span><b>Harvester</b><em>Parts</em></span></a>
    <nav class="nav"><a href="#marketplace">Marketplace</a><a href="#sell">Sell</a><a href="#plans">Plans</a><a href="#policy">Policies</a><a href="#admin">Admin</a></nav>
    <div class="actions"><button id="accountBtn" class="ghost">Login</button><button data-route="sell" class="btn small">Sell Now</button><button id="menuBtn" class="menu" aria-label="Open menu">☰</button></div>
  </header>

  <aside id="drawer" class="drawer" aria-hidden="true">
    <button class="drawer-bg" data-close></button>
    <section class="drawer-panel">
      <div class="drawer-head"><a href="#home" class="brand"><span class="brand-mark">HP</span><span><b>Harvester</b><em>Parts</em></span></a><button class="circle" data-close>×</button></div>
      <div id="drawerAccount" class="drawer-account"></div>
      <div class="drawer-grid">
        <a href="#marketplace">Browse Marketplace</a><a href="#sell">Sell Product</a><a href="#account">My Account</a><a href="#cart">Cart</a><a href="#orders">Orders</a><a href="#messages">Messages</a><a href="#plans">Seller Plans</a><a href="#policy">Policies</a>
      </div>
      <div class="drawer-note">Verified sellers only. Machines use enquiry flow, spare parts use cart checkout.</div>
    </section>
  </aside>

  <main id="app" class="app"></main>
  <button id="cartBubble" class="cart-bubble">Cart <b id="cartCount">0</b></button>
  <button id="scrollTop" class="scroll-top">↑</button>
  <div id="toast" class="toast"></div>
</body>
</html>
